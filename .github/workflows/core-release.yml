name: Core Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ci:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter langskin build

      - name: Test
        run: pnpm --filter langskin test run

  release:
    name: Release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          registry-url: https://registry.npmjs.org

      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm --filter langskin publish:npm 
          commit: "chore: bump versions and update changelog"
          title: "Release: publish new versions"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

